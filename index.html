    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Facebook, LinkedIn, iMessage) -->

    <meta property="og:url" content="https://takda-app.vercel.app/" />
    <meta property="og:title" content="Buhay — All-in-One Life Tracker for Finance, Fitness, Mind, and Goals" />
    <meta property="og:description" content="Track Takda finance, Lakas workouts and meals, Tala journal and mood, plus tasks, goals, receipts, budgets, backups, and daily patterns." />

    <!-- Twitter Card -->

    <!-- PWA / Mobile -->
    <meta name="theme-color" content="#22d87a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <!-- Sync theme before paint (matches src/lib/theme.jsx; avoids dark :root flash when user chose light) -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('takda_theme') || localStorage.getItem('sentimo_theme');
          if (t !== 'dark' && t !== 'light') t = 'light';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
